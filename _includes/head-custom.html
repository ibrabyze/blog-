{% if page.description %}
<meta name="description" content="{{ page.description | escape }}">
{% elsif site.description %}
<meta name="description" content="{{ site.description | escape }}">
{% endif %}

{% if page.keywords %}
<meta name="keywords" content="{{ page.keywords | escape }}">
{% endif %}

<meta name="author" content="{{ page.author | default: site.author | escape }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">
<meta name="robots" content="index, follow">

<meta property="og:title" content="{{ page.title | default: site.title | escape }}">
<meta property="og:description" content="{{ page.description | default: site.description | escape }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:site_name" content="{{ site.title | escape }}">
<meta property="og:locale" content="en_GB">
<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
{% if page.image %}
<meta property="og:image" content="{{ page.image | absolute_url }}">
<meta property="og:image:width" content="1280">
<meta property="og:image:height" content="720">
{% endif %}
{% if page.date %}
<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
<meta property="article:author" content="{{ page.author | default: site.author }}">
{% endif %}

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@ibrahimshuaib">
<meta name="twitter:creator" content="@ibrahimshuaib">
<meta name="twitter:title" content="{{ page.title | default: site.title | escape }}">
<meta name="twitter:description" content="{{ page.description | default: site.description | escape }}">
{% if page.image %}
<meta name="twitter:image" content="{{ page.image | absolute_url }}">
{% endif %}

{% if page.url == "/" or page.url == "/index.html" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": {{ site.title | jsonify }},
  "url": "{{ site.url }}",
  "description": {{ site.description | jsonify }},
  "author": {
    "@type": "Person",
    "name": "Ibrahim Shuaib",
    "url": "{{ site.url }}",
    "sameAs": [
      "https://www.linkedin.com/in/ibrahimshuaib",
      "https://twitter.com/ibrahimshuaib",
      "https://medium.com/@ibrahimshuaib"
    ]
  }
}
</script>
{% endif %}
